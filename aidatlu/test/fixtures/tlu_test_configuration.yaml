################################################
#                                              #
# This configuration is only used during tests #
# Changing settings besides MOCK lead to fails #
#                                              #
################################################

internal_trigger_rate: 100000
dut_interfaces:
  dut_1:
    mode: aida
    ignore_busy: false
  dut_2:
    mode: eudet
    ignore_busy: false
  dut_3:
    mode: aidatrig
    ignore_busy: false
  dut_4:
    mode: off
    ignore_busy: false

trigger_inputs:
  input_logic: '(CH1 and (not CH2) and (not CH3) and (not CH4) and (CH5) and (not CH6))'
  input_1:
    threshold: -0.1
    stretch: 2
    delay: 0
    polarity: 'falling'
  input_2:
    threshold: -0.2
    stretch: 2
    delay: 1
    polarity: 'falling'
  input_3:
    threshold: -0.3
    stretch: 3
    delay: 0
    polarity: 'falling'
  input_4:
    threshold: -0.4
    stretch: 2
    delay: 0
    polarity: 'falling'
  input_5:
    threshold: -0.5
    stretch: 2
    delay: 3
    polarity: 'falling'
  input_6:
    threshold: -0.6
    stretch: 2
    delay: 0
    polarity: 'falling'

pmt_power:
  control_voltage_1: 0.8
  control_voltage_2: 0.8
  control_voltage_3: 0.0
  control_voltage_4: -0.2

enable_clock_lemo_output: true
save_data: True
output_data_path: 'aidatlu/aidatlu/test/fixtures/test_output_data'
zmq_connection: off
max_trigger_number:
timeout: 5
clock_config: 'path/to/clock/config.txt'
